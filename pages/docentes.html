<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Docentes - LMS</title>
  <link rel="stylesheet" href="../styles/docentes.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2 class="logo">LMS</h2>
    <nav>
      <a href="panel.html">Panel</a>
      <a href="cursos.html">Cursos</a>
      <a href="docentes.html" class="active">Docentes</a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="header">
      <h2>Gestión de Docentes</h2>
    </header>

    <section class="content">

      <!-- FORMULARIO -->
      <div class="form-container">
        <h3>Registrar / Editar Docente</h3>

        <form id="docenteForm">

          <input type="text" id="codigo" placeholder="Código (DOC001)" required>
          <input type="text" id="identificacion" placeholder="Identificación" required>
          <input type="text" id="nombres" placeholder="Nombres" required>
          <input type="text" id="apellidos" placeholder="Apellidos" required>
          <input type="email" id="email" placeholder="Correo electrónico" required>
          <label>Foto del docente</label>
            <input type="file" id="fotoDocente" accept="image/*" required>
          <input type="text" id="area" placeholder="Área académica" required>

          <button type="submit">Guardar Docente</button>
        </form>

        <div class="preview">
          <img id="previewImg" src="" alt="Vista previa">
        </div>
      </div>

      <!-- TABLA -->
      <div class="table-container">
        <h3>Lista de Docentes</h3>
        <table>
          <thead>
            <tr>
              <th>Foto</th>
              <th>Código</th>
              <th>Nombre</th>
              <th>Email</th>
              <th>Área</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaDocentes"></tbody>
        </table>
      </div>

    </section>

  </main>

</div>

</body>
<script src="../scripts/docentes.js"></script>
</html>
