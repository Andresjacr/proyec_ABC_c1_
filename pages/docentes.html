<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Docentes - LMS</title>
  <link rel="stylesheet" href="../styles/docentes.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2 class="logo">LMS</h2>
    <nav>
      <a href="panel.html">Panel</a>
      <a href="cursos.html">Cursos</a>
      <a href="modulos.html">Módulos</a>
      <a href="lecciones.html">Lecciones</a>
      <a href="docentes.html" class="active">Docentes</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

    <header class="header">
      <h2>Gestión de Docentes</h2>
    </header>

    <section class="content">

      <!-- FORMULARIO -->
      <div class="form-container">
        <h3>Registrar Docente</h3>

        <form id="docenteForm">
          <input type="hidden" id="docenteId">

          <input type="text" id="nombres" placeholder="Nombres completos" required>
          <input type="email" id="email" placeholder="Correo electrónico" required>
          <input type="text" id="especialidad" placeholder="Especialidad" required>

          <button type="submit">Guardar Docente</button>
        </form>
      </div>

      <!-- TABLA -->
      <div class="table-container">
        <h3>Lista de Docentes</h3>
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Especialidad</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaDocentes"></tbody>
        </table>
      </div>

    </section>

  </main>

</div>

<script src="../scripts/docentes.js"></script>
</body>
</html>
