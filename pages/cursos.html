<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Cursos</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>

<div class="dashboard">
    <h1>Gestión de Cursos</h1>

    <form id="formCurso">
        <input type="text" id="codigoCurso" placeholder="Código" required>
        <input type="text" id="nombreCurso" placeholder="Nombre del curso" required>
        <textarea id="descripcionCurso" placeholder="Descripción"></textarea>

        <select id="docenteSelect" required>
            <option value="">Seleccione un docente</option>
        </select>

        <button type="submit">Guardar Curso</button>
    </form>

    <hr>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Docente</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaCursos"></tbody>
    </table>

    <br>
    <button onclick="window.location.href='../dashboard.html'">
        Volver al Dashboard
    </button>
</div>

<script src="../scrips/storage.js"></script>
<script src="../scrips/auth.js"></script>
<script src="../scrips/cursos.js"></script>

</body>
</html>
