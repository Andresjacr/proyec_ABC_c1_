<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Cursos</title>
<link rel="stylesheet" href="../styles/cursos.css">
</head>
<body>

<div class="container">
    <h1>Gestión de Cursos</h1>

    <div class="form-card">
        <input type="text" id="nombre" placeholder="Nombre del curso">
        <input type="text" id="descripcion" placeholder="Descripción">
        <input type="text" id="docenteId" placeholder="ID del docente">
        <button onclick="agregarCurso()">Agregar Curso</button>
    </div>

    <div class="list-card">
        <h2>Lista de Cursos</h2>
        <div id="listaCursos"></div>
    </div>

    <button onclick="window.location.href='panel.html'">Volver al Panel</button>
</div>

<script src="../scripts/cursos.js"></script>
</body>
</html>
